plugins {
    id 'java-library'
}

group = 'com.bitcoinpir'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    api 'org.bitcoinj:bitcoinj-core:0.17'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'net.java.dev.jna:jna:5.16.0'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()

    // Native library paths for HarmonyPIR (JNI) and OnionPIR (JNA).
    // HarmonyPIR: cd bitcoin-pir/harmonypir-jni && cargo build --release
    // OnionPIR:   cd OnionPIRv2 && mkdir build-shared && cd build-shared
    //             cmake .. -DBUILD_SHARED_LIBS=ON && make -j
    def harmonyLibDir = findProperty('harmonyLibDir')
        ?: System.getenv('HARMONYPIR_LIB_DIR')
        ?: "${rootDir}/../../bitcoin-pir/harmonypir-jni/target/release"
    def onionLibDir = findProperty('onionLibDir')
        ?: System.getenv('ONIONPIR_LIB_DIR')
        ?: "${rootDir}/../electrum_plugin/onionpir-python"
    systemProperty 'java.library.path', "${harmonyLibDir}:${onionLibDir}"
    systemProperty 'jna.library.path', onionLibDir
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}
